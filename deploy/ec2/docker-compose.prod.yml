name: reycom-prod

services:
  reycom-api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY:-reycom-api}:latest
    container_name: reycom-prod-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_ENDPOINT: ${DYNAMODB_ENDPOINT:-http://dynamodb-local:8000}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-reycom_order_events}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      REYCOM_KAFKA_ENABLED: "true"
      AWS_DYNAMODB_ENABLED: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - reycom-network

  postgres:
    image: postgres:16-alpine
    container_name: reycom-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reycom-network

  redis:
    image: redis:7-alpine
    container_name: reycom-prod-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reycom-network

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: reycom-prod-dynamodb
    restart: unless-stopped
    depends_on:
      dynamodb-volume-init:
        condition: service_completed_successfully
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    networks:
      - reycom-network

  dynamodb-volume-init:
    image: alpine:3.20
    container_name: reycom-prod-dynamodb-volume-init
    user: "0:0"
    network_mode: none
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumes:
      - dynamodb_data:/data

  dynamodb-init:
    image: amazon/aws-cli:2.17.49
    container_name: reycom-prod-dynamodb-init
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ${AWS_REGION}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-reycom_order_events}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      '
      attempt=0;
      until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; do
        attempt=$$((attempt + 1));
        if [ "$${attempt}" -ge 30 ]; then
          echo "DynamoDB Local did not become ready in time." >&2;
          exit 1;
        fi;
        echo "Waiting for DynamoDB Local...";
        sleep 2;
      done;
      aws dynamodb describe-table --endpoint-url http://dynamodb-local:8000 --table-name "$${DYNAMODB_TABLE_NAME}" >/dev/null 2>&1
      || aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 --table-name "$${DYNAMODB_TABLE_NAME}" --attribute-definitions AttributeName=orderId,AttributeType=S AttributeName=eventTime,AttributeType=S --key-schema AttributeName=orderId,KeyType=HASH AttributeName=eventTime,KeyType=RANGE --billing-mode PAY_PER_REQUEST;
      echo "DynamoDB table is ready: $${DYNAMODB_TABLE_NAME}";
      '
    networks:
      - reycom-network

  kafka:
    image: redpandadata/redpanda:v24.3.5
    container_name: reycom-prod-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr
      - INTERNAL://kafka:9092
    volumes:
      - kafka_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - reycom-network

networks:
  reycom-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  dynamodb_data:
  kafka_data:
