services:
  reycom-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reycom-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-reycom_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-reycom_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-reycom_password}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-secret-at-least-32-characters}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      DYNAMODB_ENDPOINT: ${DYNAMODB_ENDPOINT:-http://dynamodb-local:8000}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-reycom_order_events}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    ports:
      - "8080:8080"

  reycom-console:
    build:
      context: .
      dockerfile: console/Dockerfile
    container_name: reycom-console
    restart: unless-stopped
    depends_on:
      - reycom-api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:80"

  postgres:
    image: postgres:16-alpine
    container_name: reycom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reycom_db}
      POSTGRES_USER: ${POSTGRES_USER:-reycom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reycom_password}
    ports:
      - "5432:5432"
    volumes:
      - reycom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: reycom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: reycom-dynamodb-local
    restart: unless-stopped
    command: "-jar DynamoDBLocal.jar -sharedDb"
    ports:
      - "8000:8000"

  dynamodb-init:
    image: amazon/aws-cli:2.17.49
    container_name: reycom-dynamodb-init
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ${AWS_REGION:-ap-south-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-reycom_order_events}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      '
      until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; do
        echo "Waiting for DynamoDB Local...";
        sleep 2;
      done;
      aws dynamodb describe-table --endpoint-url http://dynamodb-local:8000 --table-name "$${DYNAMODB_TABLE_NAME}" >/dev/null 2>&1
      || aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 --table-name "$${DYNAMODB_TABLE_NAME}" --attribute-definitions AttributeName=orderId,AttributeType=S AttributeName=eventTime,AttributeType=S --key-schema AttributeName=orderId,KeyType=HASH AttributeName=eventTime,KeyType=RANGE --billing-mode PAY_PER_REQUEST;
      echo "DynamoDB table is ready: $${DYNAMODB_TABLE_NAME}";
      '

  kafka:
    image: redpandadata/redpanda:v24.3.5
    container_name: reycom-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://kafka:9092,EXTERNAL://localhost:9092
    ports:
      - "9092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-ui:
    image: redpandadata/console:v2.8.3
    container_name: reycom-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8081:8080"

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: reycom-prometheus
    restart: unless-stopped
    depends_on:
      - reycom-api
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - reycom_prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.1.0
    container_name: reycom-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - reycom_grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"

volumes:
  reycom_postgres_data:
  reycom_prometheus_data:
  reycom_grafana_data:
