services:
  postgres:
    image: postgres:16-alpine
    container_name: reycom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reycom_db
      POSTGRES_USER: reycom_user
      POSTGRES_PASSWORD: reycom_password
    ports:
      - "5432:5432"
    volumes:
      - reycom_postgres_data:/var/lib/postgresql/data

  dynamodb:
    image: amazon/dynamodb-local
    container_name: reycom-dynamodb
    restart: unless-stopped
    command: "-jar DynamoDBLocal.jar -sharedDb"
    ports:
      - "8000:8000"

  redis:
    image: redis:7
    container_name: reycom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Kafka-compatible broker for local async event testing.
  # Start it with: docker compose up -d kafka kafka-ui
  kafka:
    image: redpandadata/redpanda:v24.3.5
    container_name: reycom-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://kafka:9092,EXTERNAL://localhost:9092
    ports:
      - "9092:19092"
      - "9644:9644"

  kafka-ui:
    image: redpandadata/console:v2.8.3
    container_name: reycom-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8081:8080"

volumes:
  reycom_postgres_data:
