spring:
  cache:
    type: simple
  kafka:
    listener:
      auto-startup: false
  data:
    redis:
      repositories:
        enabled: false
  datasource:
    url: jdbc:h2:mem:reycom_test_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

reycom:
  kafka:
    enabled: false
  security:
    jwt:
      secret: reycom-test-secret-key-for-integration-tests-change-me
      expiration-ms: 86400000

aws:
  region: ap-south-1
  dynamodb:
    enabled: false
    endpoint:
    table-name: reycom_order_events
