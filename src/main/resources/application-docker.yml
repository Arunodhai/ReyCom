spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/reycom_db}
    username: ${SPRING_DATASOURCE_USERNAME:reycom_user}
    password: ${SPRING_DATASOURCE_PASSWORD:reycom_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

reycom:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
  kafka:
    enabled: ${REYCOM_KAFKA_ENABLED:true}
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

aws:
  region: ${AWS_REGION:ap-south-1}
  dynamodb:
    enabled: ${AWS_DYNAMODB_ENABLED:true}
    endpoint: ${DYNAMODB_ENDPOINT:http://dynamodb-local:8000}
    table-name: ${DYNAMODB_TABLE_NAME:reycom_order_events}
