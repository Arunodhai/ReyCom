spring:
  application:
    name: reycom
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: 1000
        request.timeout.ms: 1000
        delivery.timeout.ms: 3000
    consumer:
      group-id: reycom-notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.reydark.reycom.event
    listener:
      missing-topics-fatal: false

server:
  port: 8080

reycom:
  kafka:
    enabled: ${REYCOM_KAFKA_ENABLED:true}
  security:
    jwt:
      secret: ${JWT_SECRET:reycom-local-development-secret-key-change-me-please}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

aws:
  region: ${AWS_REGION:ap-south-1}
  dynamodb:
    enabled: ${AWS_DYNAMODB_ENABLED:true}
    endpoint: ${AWS_DYNAMODB_ENDPOINT:http://localhost:8000}
    table-name: ${AWS_DYNAMODB_TABLE_NAME:reycom_order_events}

reycom-cache:
  ttl:
    products: 10m
    product-details: 10m
    categories: 30m
    category-details: 30m

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/reycom_db
    username: reycom_user
    password: reycom_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
