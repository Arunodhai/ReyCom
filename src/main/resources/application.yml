spring:
  application:
    name: reycom
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  cache:
    type: redis

server:
  port: 8080

reycom:
  security:
    jwt:
      secret: ${JWT_SECRET:reycom-local-development-secret-key-change-me-please}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

aws:
  region: ${AWS_REGION:ap-south-1}
  dynamodb:
    enabled: ${AWS_DYNAMODB_ENABLED:true}
    endpoint: ${AWS_DYNAMODB_ENDPOINT:http://localhost:8000}
    table-name: ${AWS_DYNAMODB_TABLE_NAME:reycom_order_events}

reycom-cache:
  ttl:
    products: 10m
    product-details: 10m
    categories: 30m
    category-details: 30m

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/reycom_db
    username: reycom_user
    password: reycom_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
