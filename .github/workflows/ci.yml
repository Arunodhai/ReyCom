name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw --batch-mode test

      - name: Build backend JAR
        run: ./mvnw --batch-mode clean package -DskipTests

      - name: Build backend Docker image
        run: docker build -t reycom-api:ci .

  frontend:
    name: Console
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: console

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install console dependencies
        run: npm ci

      - name: Build console
        run: npm run build

      - name: Build console Docker image
        working-directory: .
        run: docker build -f console/Dockerfile -t reycom-console:ci .

  compose-validation:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet
